<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafrex/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <script>
      // This script handles the redirect for GitHub Pages SPA routing
      (function() {
        var path = window.location.pathname;
        var hash = window.location.hash;
        var basePath = '/mogoljohnleeportfolio';
        
        // Check if we already have a hash route (from direct navigation)
        if (hash && hash !== '/') {
          // Already has hash, just redirect to main app
          window.location.href = basePath + '/' + hash;
        } else {
          // Remove the base path from the current path
          if (path.startsWith(basePath)) {
            path = path.substring(basePath.length);
          }
          
          // Remove trailing slash if present
          if (path.endsWith('/')) {
            path = path.slice(0, -1);
          }
          
          // If path is not empty, redirect with hash
          if (path && path !== '') {
            window.location.href = basePath + '/#' + path;
          } else {
            window.location.href = basePath + '/';
          }
        }
      })();
    </script>
  </body>
</html>
